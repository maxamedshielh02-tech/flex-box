<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>

    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        h1{
            background-color: antiquewhite;
            padding: 30px;
            font-size: 60px;
            text-align: center;
        }

        .container{
            width: 100%;
            border: 1px solid salmon;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 10px;
        }

        .card{
            background-color: aquamarine;
            padding: 26px;
            border: 2px solid green;
            border-radius: 15px;
            margin: 10px;
            flex: 1 1 300px;
            transition: transform 0.5s;
        }

        .card:hover{
            transform: scale(1.05);
        }

        .card img{
            width: 100%;
            max-height: 300px;
            object-fit: cover;
            border-radius: 15px;
        }

        .card h3,
        .card h4{
            text-align: center;
            background-color: rgb(194, 244, 227);
            padding: 7px;
            margin-top: 5px;
        }

        @media (max-width: 768px){
            .card{
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

    <h1>Barashada Flex Box</h1>

    <div class="container">
        <div class="card">
            <img src="classic-studio-portrait-black-american-male-dressed-suit-grey-vignette-background.jpg" alt="image1">
            <h3>Mohamed Abdi</h3>
            <h4>CA252</h4>
        </div>

        <div class="card">
            <img src="bayashi poi.jpg" alt="image2">
            <h3>Mohamed Abdi</h3>
            <h4>CA252</h4>
        </div>

        <div class="card">
            <img src="portrait-serious-male-boss-has-grumpy-expression-being-annoyed-with-workers.jpg" alt="image3">
            <h3>Mohamed Abdi</h3>
            <h4>CA252</h4>
        </div>
    </div>

</body>
</html>
